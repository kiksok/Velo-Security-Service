version: '3'

services:
  velo-security-service:
    image: velo-security-service:0.1.0
    container_name: velo-security-service
    restart: always
    ports:
      - "127.0.0.1:12020:3000"
    environment:
      - PORT=3000
      - BACKEND_PANEL=xb
      - BACKEND_DOMAIN=http://172.17.0.1:1024
      - SEC_PASSWORD=change-this-to-a-long-random-secret
      - HARDENED_MODE=true
      - RPC_PATH=/assets/event
      - ALLOWED_ORIGINS=https://your-theme-domain.example
      - RPC_PROXY_ENABLED=false
